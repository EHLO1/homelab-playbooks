---
# PROXMOX_URL, PROXMOX_USER, PROXMOX_TOKEN_ID, PROXMOX_TOKEN_SECRET, ANSIBLE_SSH_KEY
# All the above are fed in by the doppler CLI and do not need to be specified here.

plugin: community.proxmox.proxmox
validate_certs: false
want_facts: true
keyed_groups:
  - key: proxmox_tags_parsed
    separator: ""
    prefix: ""
filters:
  - proxmox_status == "running"