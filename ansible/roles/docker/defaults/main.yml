---
docker_packages:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin

# apt suite for Docker's repo. Defaults to the host's release codename
# (noble, resolute, ...). For a brand-new Ubuntu release that Docker hasn't
# published packages for yet, override this to the latest codename Docker
# does ship, e.g.:  docker_apt_suite: noble
docker_apt_suite: "{{ ansible_distribution_release }}"
